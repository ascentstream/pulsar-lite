name: Build Private Python Wheel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-private-wheel:
    name: Build private wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            os: ubuntu-latest
            artifact-name: pulsar-lite-linux-wheel
          - label: macos
            os: macos-latest
            artifact-name: pulsar-lite-macos-wheel

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler clang libclang-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Build Rust broker
        run: cargo build --manifest-path rust/Cargo.toml --release --features rocksdb-storage

      - name: Copy broker binary into Python package
        run: |
          mkdir -p python/src/pulsar_lite/bin
          cp rust/target/release/pulsar-lite python/src/pulsar_lite/bin/pulsar-lite
          chmod +x python/src/pulsar_lite/bin/pulsar-lite

      - name: Inspect broker binary architecture
        run: file python/src/pulsar_lite/bin/pulsar-lite

      - name: Build private Python wheel
        working-directory: python
        run: uv build --wheel --python 3.10 --managed-python --out-dir dist-private

      - name: Inspect wheel contents
        working-directory: python
        run: |
          uv run --python 3.10 --managed-python --no-project python -m zipfile -l dist-private/*.whl | grep pulsar_lite/bin/pulsar-lite

      - name: Upload private wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: python/dist-private/*.whl
          if-no-files-found: error
          retention-days: 7
