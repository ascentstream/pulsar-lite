name: CD

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        default: artifacts-only
        type: choice
        options:
          - artifacts-only
          - testpypi
          - pypi
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  version-check:
    name: Verify version consistency
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tag and pyproject.toml version match
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(grep '^version = ' python/pyproject.toml | cut -d'"' -f2)

          echo "Git tag version: v$TAG_VERSION"
          echo "pyproject.toml version: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Version mismatch detected!"
            echo "   Git tag: v$TAG_VERSION"
            echo "   pyproject.toml: $PKG_VERSION"
            echo ""
            echo "Please update python/pyproject.toml to match the tag version."
            exit 1
          fi

          echo "✅ Version consistency verified: $PKG_VERSION"

  build:
    name: Build wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: [version-check]
    if: |
      always() &&
      (needs.version-check.result == 'success' || needs.version-check.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            artifact-name: pulsar-lite-linux-x86_64-wheel
            binary-name: pulsar-lite
            fast-mode: true
          - label: macos-arm64
            os: macos-latest
            artifact-name: pulsar-lite-macos-arm64-wheel
            binary-name: pulsar-lite
            fast-mode: true
          - label: windows-x86_64
            os: windows-latest
            artifact-name: pulsar-lite-windows-x86_64-wheel
            binary-name: pulsar-lite.exe
            fast-mode: false

    steps:
      # 在 artifacts-only 模式下跳过 fast-mode=false 的平台
      - name: Check if should run
        id: should-run
        shell: bash
        run: |
          target="${{ github.event.inputs.target }}"
          fast_mode="${{ matrix.fast-mode }}"
          if [[ "$target" == "artifacts-only" && "$fast_mode" == "false" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.label }} in artifacts-only mode"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Building ${{ matrix.label }}"
          fi

      - name: Checkout
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install protoc (macOS)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'macOS'
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc (Windows)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        if: steps.should-run.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        if: steps.should-run.outputs.skip != 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Build Rust broker
        if: steps.should-run.outputs.skip != 'true'
        shell: bash
        run: cargo build --manifest-path rust/Cargo.toml --release

      - name: Copy broker binary into Python package
        if: steps.should-run.outputs.skip != 'true'
        shell: bash
        run: |
          mkdir -p python/src/pulsar_lite/bin
          cp rust/target/release/${{ matrix.binary-name }} python/src/pulsar_lite/bin/${{ matrix.binary-name }}

      - name: Set executable permission (Unix only)
        if: steps.should-run.outputs.skip != 'true' && runner.os != 'Windows'
        shell: bash
        run: chmod +x python/src/pulsar_lite/bin/${{ matrix.binary-name }}

      - name: Inspect broker binary architecture
        if: steps.should-run.outputs.skip != 'true' && runner.os != 'Windows'
        shell: bash
        run: file python/src/pulsar_lite/bin/${{ matrix.binary-name }}

      - name: Inspect broker binary (Windows)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Item python/src/pulsar_lite/bin/${{ matrix.binary-name }} | Format-List

      - name: Build Python wheel
        if: steps.should-run.outputs.skip != 'true'
        working-directory: python
        run: uv build --wheel --python 3.10 --managed-python --out-dir dist

      - name: Build source distribution (linux only)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Linux'
        working-directory: python
        run: uv build --sdist --python 3.10 --managed-python --out-dir dist
        # sdist 是平台无关的，只需要在一个平台上构建一次

      - name: Install wheel repair tools (Linux)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Linux' && github.event.inputs.target != 'artifacts-only'
        shell: bash
        run: |
          uv tool install auditwheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install wheel repair tools (macOS)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'macOS' && github.event.inputs.target != 'artifacts-only'
        shell: bash
        run: uv tool install delocate

      - name: Repair wheel (Linux - manylinux)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'Linux' && github.event.inputs.target != 'artifacts-only'
        working-directory: python
        shell: bash
        run: |
          mkdir -p dist-repaired
          auditwheel show dist/*.whl || true
          if auditwheel repair dist/*.whl -w dist-repaired --plat manylinux_2_17_x86_64; then
            echo "Wheel repaired with manylinux tag"
          else
            echo "WARNING: auditwheel failed, keeping original wheel (may not be manylinux-compliant)"
            cp dist/*.whl dist-repaired/
          fi
          rm -rf dist
          mv dist-repaired dist

      - name: Repair wheel (macOS - delocate)
        if: steps.should-run.outputs.skip != 'true' && runner.os == 'macOS' && github.event.inputs.target != 'artifacts-only'
        working-directory: python
        shell: bash
        run: |
          mkdir -p dist-repaired
          for wheel in dist/*.whl; do
            delocate-wheel -w dist-repaired "$wheel"
          done
          rm -rf dist
          mv dist-repaired dist

      - name: Inspect wheel contents
        if: steps.should-run.outputs.skip != 'true'
        working-directory: python
        shell: bash
        run: |
          uv run --python 3.10 --managed-python --no-project python -m zipfile -l dist/*.whl | grep "pulsar_lite/bin/${{ matrix.binary-name }}"

      - name: Inspect built artifacts
        if: steps.should-run.outputs.skip != 'true'
        working-directory: python
        shell: bash
        run: ls -lh dist/

      - name: Test wheel installation
        if: steps.should-run.outputs.skip != 'true'
        working-directory: python
        shell: bash
        run: |
          # 创建临时虚拟环境测试安装（不激活，直接用 uv 指定 python 路径）
          uv venv --python 3.10 .test-venv

          # Unix 用 .test-venv/bin/python，Windows 用 .test-venv/Scripts/python.exe
          if [ -f ".test-venv/bin/python" ]; then
            VENV_PY=".test-venv/bin/python"
          else
            VENV_PY=".test-venv/Scripts/python.exe"
          fi

          # 安装构建的 wheel 到该 venv
          uv pip install --python "$VENV_PY" dist/*.whl

          # 验证包可导入
          "$VENV_PY" -c "import pulsar_lite; print('Package imported successfully')"

          # 验证二进制查找逻辑能定位到打包的二进制
          "$VENV_PY" -c "from pulsar_lite.binary_finder import find_pulsar_lite_binary; b = find_pulsar_lite_binary(); print(f'Binary found at: {b}')"

          # 清理
          rm -rf .test-venv

      - name: Upload wheel artifact
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: python/dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to ${{ github.event.inputs.target || 'pypi' }}
    needs: [version-check, build]
    runs-on: ubuntu-latest
    # 跳过 artifacts-only 模式
    if: github.event.inputs.target != 'artifacts-only'
    environment:
      name: ${{ (github.event.inputs.target == 'pypi' || startsWith(github.ref, 'refs/tags/v')) && 'pypi' || 'testpypi' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Inspect collected artifacts
        shell: bash
        run: |
          echo "=== Collected distributions ==="
          ls -lh dist/
          echo ""
          echo "=== Wheel platform tags ==="
          for f in dist/*.whl; do
            basename "$f"
          done
          echo ""
          echo "=== Total artifacts ==="
          echo "Wheels: $(ls -1 dist/*.whl 2>/dev/null | wc -l)"
          echo "Source distributions: $(ls -1 dist/*.tar.gz 2>/dev/null | wc -l)"

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine target repository
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "repository=pypi" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.target }}" = "pypi" ]; then
            echo "repository=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "repository=testpypi" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to TestPyPI
        if: steps.target.outputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI
        if: steps.target.outputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
