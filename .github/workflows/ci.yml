name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Run clippy
        run: scripts/run_rust_clippy.sh

      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml --features rocksdb-storage

      - name: Build release broker
        run: cargo build --manifest-path rust/Cargo.toml --release --features rocksdb-storage

  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python package
        run: python -m pip install -e "python[dev]"

      - name: Build release broker
        run: cargo build --manifest-path rust/Cargo.toml --release --features rocksdb-storage

      - name: Run Python integration tests
        run: scripts/run_python_tests_with_broker.sh

      - name: Upload broker log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-lite-broker-log
          path: /tmp/pulsar-lite.log
          if-no-files-found: ignore
