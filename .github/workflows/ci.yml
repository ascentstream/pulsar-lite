name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================
  # Job 1: 构建 release broker（只构建一次）
  # ============================================
  build-broker:
    name: Build broker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🚀 Cargo 缓存 - 节省 1-3 分钟
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # 缓存 key 包含 Cargo.lock 哈希，依赖更新时自动失效
          key: broker-release

      - name: Build release broker
        run: cargo build --manifest-path rust/Cargo.toml --release --features rocksdb-storage

      # 📦 上传构建产物供其他 jobs 使用
      - name: Upload broker binary
        uses: actions/upload-artifact@v7
        with:
          name: pulsar-lite-broker
          path: rust/target/release/pulsar-lite
          retention-days: 1

  # ============================================
  # Job 2: Rust 代码质量检查（并行运行）
  # ============================================
  rust-quality:
    name: Rust quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler clang libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # 🚀 Cargo 缓存
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: quality-checks

      # fmt 不需要编译，最快
      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      # clippy 需要编译但是 check 模式（比 build 快）
      - name: Run clippy
        run: scripts/run_rust_clippy.sh

      # test 需要编译测试代码
      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml --features rocksdb-storage

  # ============================================
  # Job 3: Python 集成测试（复用 broker）
  # ============================================
  python-test:
    name: Python integration tests
    runs-on: ubuntu-latest
    needs: build-broker  # 🔗 等待 build-broker 完成
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          # 🚀 缓存 pip 依赖
          cache: 'pip'
          cache-dependency-path: 'python/pyproject.toml'

      # 📥 下载预构建的 broker（节省 3-8 分钟）
      - name: Download broker binary
        uses: actions/download-artifact@v7
        with:
          name: pulsar-lite-broker
          path: rust/target/release/

      - name: Set executable permission
        run: chmod +x rust/target/release/pulsar-lite

      - name: Verify broker binary
        run: |
          file rust/target/release/pulsar-lite
          rust/target/release/pulsar-lite --version || echo "Binary ready"

      - name: Install Python package
        run: python -m pip install -e "python[dev]"

      - name: Run Python integration tests
        run: scripts/run_python_tests_with_broker.sh

      - name: Upload broker log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pulsar-lite-broker-log
          path: /tmp/pulsar-lite.log
          if-no-files-found: ignore
